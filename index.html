<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nearby Breweries</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
padding:20px;
}

button{
padding:12px 16px;
font-size:16px;
background:#1f6feb;
color:white;
border:none;
border-radius:6px;
}

.card{
background:white;
padding:15px;
margin-top:15px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

h3{margin:0 0 5px 0}
</style>
</head>

<body>

<h2>🍺 Breweries Near Me</h2>

<button onclick="findBreweries()">Find Breweries Near Me</button>

<div id="results"></div>

<script>

async function findBreweries(){

if(!navigator.geolocation){
alert("Location not supported")
return
}

navigator.geolocation.getCurrentPosition(async position => {

const lat = position.coords.latitude
const lon = position.coords.longitude

const res = await fetch(
`https://api.openbrewerydb.org/v1/breweries?by_dist=${lat},${lon}&per_page=10`
)

const breweries = await res.json()

const results = document.getElementById("results")
results.innerHTML=""

breweries.forEach(b => {

results.innerHTML += `
<div class="card">
<h3>${b.name}</h3>
<p><b>Type:</b> ${b.brewery_type}</p>
<p><b>City:</b> ${b.city}</p>
${b.website_url ? `<a href="${b.website_url}" target="_blank">Website</a>` : ""}
</div>
`
})

})

}

</script>

</body>
</html>
