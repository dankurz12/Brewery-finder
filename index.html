<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Brewery Finder</title>

<style>
:root{
--bg:#0b1220;
--bg2:#0c1630;
--card:rgba(255,255,255,.06);
--text:#eaf0ff;
--muted:rgba(234,240,255,.70);
--border:rgba(255,255,255,.12);
--shadow:0 12px 30px rgba(0,0,0,.35);
--radius:16px;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
color:var(--text);
background:radial-gradient(1200px 800px at 10% -10%,#1a3170 0%,var(--bg2) 35%,var(--bg) 70%);
}

.topbar{
position:sticky;
top:0;
z-index:10;
backdrop-filter:blur(10px);
background:rgba(11,18,32,.72);
border-bottom:1px solid var(--border);
}

.topbar-inner{
max-width:900px;
margin:auto;
padding:12px 16px;
display:flex;
justify-content:space-between;
align-items:center;
}

.brand{
font-weight:900;
font-size:16px;
}

.smallpill{
padding:6px 10px;
border-radius:999px;
border:1px solid var(--border);
background:rgba(255,255,255,.05);
color:var(--muted);
font-size:12px;
}

main{
max-width:900px;
margin:auto;
padding:14px 16px 40px;
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px;
}

button{
border:1px solid rgba(78,161,255,.45);
background:linear-gradient(180deg,rgba(78,161,255,.95),rgba(78,161,255,.7));
color:#051126;
font-weight:900;
padding:10px 14px;
border-radius:12px;
cursor:pointer;
}

.secondary{
background:rgba(255,255,255,.06);
color:var(--text);
border:1px solid var(--border);
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:12px;
}

.card{
border:1px solid var(--border);
border-radius:var(--radius);
background:var(--card);
padding:14px;
box-shadow:var(--shadow);
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:8px;
}

.name{
font-weight:900;
margin:0;
}

.badge{
font-size:12px;
padding:5px 9px;
border-radius:999px;
border:1px solid var(--border);
background:rgba(255,255,255,.06);
color:var(--muted);
}

.badge.dist{
background:rgba(56,217,150,.14);
border-color:rgba(56,217,150,.25);
color:#caffed;
font-weight:900;
}

.meta{
font-size:13px;
color:var(--muted);
display:grid;
gap:4px;
}

.links{
margin-top:10px;
display:flex;
flex-wrap:wrap;
gap:8px;
}

.linkbtn{
padding:8px 10px;
border-radius:10px;
border:1px solid var(--border);
background:rgba(255,255,255,.06);
color:var(--text);
text-decoration:none;
font-size:13px;
font-weight:800;
}

.linkbtn.primary{
background:rgba(78,161,255,.16);
border-color:rgba(78,161,255,.40);
color:#dcebff;
}

.status{font-size:13px;color:var(--muted);margin-top:8px;}
.error{color:#ffb0b0;font-weight:900;margin-top:8px;}

@media (min-width:800px){
.grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>

<body>

<div class="topbar">
<div class="topbar-inner">
<div class="brand">🍺 Brewery Finder</div>
<div class="smallpill" id="locPill">Loc: not set</div>
</div>
</div>

<main>

<div class="controls">
<button id="locBtn" onclick="locateAndFetch()">Locate Me</button>
<button class="secondary" onclick="refreshSameLocation()">Refresh</button>
<div class="smallpill" id="countPill">Loaded: 0</div>
</div>

<div class="status" id="status"></div>
<div class="error" id="error"></div>

<div class="grid" id="grid"></div>

</main>

<script>

let userLat=null;
let userLon=null;
let breweries=[];

function toRad(x){return x*Math.PI/180;}

function distanceMiles(lat1,lon1,lat2,lon2){
const R=3958.8;
const dLat=toRad(lat2-lat1);
const dLon=toRad(lon2-lon1);

const a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*
Math.sin(dLon/2)*Math.sin(dLon/2);

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
return R*c;
}

function mapsGoogle(lat,lon,name){
const q=encodeURIComponent(`${lat},${lon} (${name})`);
return `https://www.google.com/maps/search/?api=1&query=${q}`;
}

function mapsApple(lat,lon,name){
const q=encodeURIComponent(name);
return `https://maps.apple.com/?ll=${lat},${lon}&q=${q}`;
}

function untappdSearchLink(name){
const q=encodeURIComponent(name||"");
return `https://untappd.com/search?q=${q}`;
}

function setLocPill(){
const p=document.getElementById("locPill");
if(userLat==null){p.textContent="Loc: not set";return;}
p.textContent=`Loc: ${userLat.toFixed(3)}, ${userLon.toFixed(3)}`;
}

function setCount(){
document.getElementById("countPill").textContent=`Loaded: ${breweries.length}`;
}

async function fetchBreweries(lat,lon){

const url=`https://api.openbrewerydb.org/v1/breweries?by_dist=${lat},${lon}&per_page=50`;

document.getElementById("status").textContent="Fetching breweries…";

const res=await fetch(url);
const data=await res.json();

breweries=data
.map(b=>{
if(!b.latitude||!b.longitude)return null;

const dist=distanceMiles(lat,lon,Number(b.latitude),Number(b.longitude));

return {...b,_dist:dist};
})
.filter(Boolean)
.sort((a,b)=>a._dist-b._dist);

setCount();

document.getElementById("status").textContent=`Showing ${breweries.length} breweries nearby`;

render();
}

function render(){

const grid=document.getElementById("grid");
grid.innerHTML="";

if(breweries.length===0){
grid.innerHTML=`<div class="card">Tap Locate Me to load breweries</div>`;
return;
}

breweries.forEach(b=>{

const address=[b.address_1,b.city,b.state_province].filter(Boolean).join(", ");

const g=mapsGoogle(b.latitude,b.longitude,b.name);
const a=mapsApple(b.latitude,b.longitude,b.name);
const u=untappdSearchLink(b.name);

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="top">
<h3 class="name">${b.name}</h3>
<span class="badge dist">${b._dist.toFixed(1)} mi</span>
</div>

<div class="meta">
<div><b>Type:</b> ${b.brewery_type}</div>
<div><b>Address:</b> ${address||"Unknown"}</div>
</div>

<div class="links">
<a class="linkbtn primary" href="${g}" target="_blank">Google Maps</a>
<a class="linkbtn" href="${a}" target="_blank">Apple Maps</a>
<a class="linkbtn" href="${u}" target="_blank">🍺 Untappd</a>
${b.website_url?`<a class="linkbtn" href="${b.website_url}" target="_blank">Website</a>`:""}
</div>
`;

grid.appendChild(card);

});

}

function locateAndFetch(){

const btn=document.getElementById("locBtn");
btn.disabled=true;
btn.textContent="Locating…";

navigator.geolocation.getCurrentPosition(async pos=>{

userLat=pos.coords.latitude;
userLon=pos.coords.longitude;

setLocPill();

btn.textContent="Loading…";

await fetchBreweries(userLat,userLon);

btn.disabled=false;
btn.textContent="Locate Me";

},()=>{
document.getElementById("error").textContent="Location permission required.";
btn.disabled=false;
btn.textContent="Locate Me";
});
}

async function refreshSameLocation(){
if(userLat==null)return;
await fetchBreweries(userLat,userLon);
}

render();

</script>

</body>
</html>
