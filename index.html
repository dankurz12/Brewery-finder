<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>Brewery Finder</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
    defer
  ></script>

  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #1d2330;
      --text: #f4f6f8;
      --muted: #a6b0bf;
      --border: #2c3442;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
      --radius: 16px;
      --radius-sm: 12px;
      --max-width: 920px;
      --header-height: 72px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Helvetica, Arial, sans-serif;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      background: rgba(15, 17, 21, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .header-inner {
      width: 100%;
      max-width: var(--max-width);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo { font-size: 24px; line-height: 1; }

    .title-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .subtitle { font-size: 12px; color: var(--muted); }

    .page {
      width: 100%;
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 16px;
      display: grid;
      gap: 16px;
    }

    .card {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .controls {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .top-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      border: 1px solid var(--border);
      background: #131821;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      border-color: #445066;
      background: #161d28;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
      color: var(--muted);
      user-select: none;
    }

    .toggle input {
      width: 18px;
      height: 18px;
      accent-color: #3b82f6;
    }

    .status {
      font-size: 14px;
      color: var(--muted);
    }

    .map-card { overflow: hidden; }

    #map {
      height: 320px;
      width: 100%;
      background: #0b0d12;
    }

    .list-card {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .list-title { font-size: 18px; font-weight: 800; }
    .results-count { color: var(--muted); font-size: 14px; }

    .brewery-list { display: grid; gap: 12px; }

    .brewery-card {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.025);
      border-radius: var(--radius-sm);
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .brewery-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .brewery-name {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.2;
      margin: 0;
    }

    .brewery-type {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
    }

    .brewery-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
    }

    .pill a {
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
    }

    .pill a:hover { text-decoration: underline; }

    .brewery-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    a.action-link {
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 700;
      background: #131821;
    }

    a.action-link:hover {
      border-color: #445066;
      background: #161d28;
    }

    .center {
      display: flex;
      justify-content: center;
    }

    .empty, .loading, .error {
      border: 1px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 18px;
      color: var(--muted);
      text-align: center;
    }

    .error {
      color: #fecaca;
      border-color: rgba(239, 68, 68, 0.45);
      background: rgba(239, 68, 68, 0.08);
    }

    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
      background: #12161d;
      color: var(--text);
    }

    .popup-title {
      font-weight: 800;
      margin-bottom: 6px;
      font-size: 15px;
    }

    .popup-meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .popup-link {
      display: inline-block;
      margin-top: 8px;
      color: #fff;
      font-weight: 700;
      text-decoration: underline;
    }

    @media (max-width: 720px) {
      #map { height: 280px; }
      .brewery-top { flex-direction: column; }
    }
  </style>
</head>

<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="logo">🍺</div>
      <div class="title-wrap">
        <div class="title">Brewery Finder</div>
        <div class="subtitle">Breweries near you (distance + map)</div>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="card controls">
      <div class="top-row">
        <div class="button-row">
          <button id="locateBtn">Locate Me</button>
          <button id="refreshBtn">Refresh</button>

          <label class="toggle" title="If the data has closed status, this filters them out by default.">
            <input id="includeClosedToggle" type="checkbox" />
            Include permanently closed
          </label>
        </div>
      </div>

      <div class="status" id="statusText">Location not set.</div>
    </section>

    <section class="card map-card">
      <div id="map"></div>
    </section>

    <section class="card list-card">
      <div class="list-header">
        <div class="list-title">Nearby Breweries</div>
        <div class="results-count" id="resultsCount">0 results</div>
      </div>

      <div id="listState" class="empty">Tap “Locate Me” to load breweries near you.</div>
      <div id="breweryList" class="brewery-list" style="display: none;"></div>

      <div class="center">
        <button id="loadMoreBtn" style="display: none;">Load More</button>
      </div>
    </section>
  </main>

  <script>
    const OPEN_BREWERY_URL = "https://api.openbrewerydb.org/v1/breweries";
    const UNTAPPD_SEARCH_BASE = "https://untappd.com/search?q=";

    const state = {
      userLat: null,
      userLng: null,
      breweries: [],
      visibleCount: 20,
      map: null,
      userMarker: null,
      breweryMarkers: [],
      hasLoadedOnce: false
    };

    const locateBtn = document.getElementById("locateBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const includeClosedToggle = document.getElementById("includeClosedToggle");
    const statusText = document.getElementById("statusText");
    const resultsCount = document.getElementById("resultsCount");
    const listState = document.getElementById("listState");
    const breweryList = document.getElementById("breweryList");
    const loadMoreBtn = document.getElementById("loadMoreBtn");

    function initMap() {
      state.map = L.map("map", { zoomControl: true }).setView([39.8283, -98.5795], 4);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap contributors"
      }).addTo(state.map);
    }

    function setStatus(message) {
      statusText.textContent = message;
    }

    function formatMiles(miles) {
      if (miles == null || Number.isNaN(miles)) return "—";
      if (miles < 10) return `${miles.toFixed(1)} mi`;
      return `${Math.round(miles)} mi`;
    }

    function slugify(text) {
      return String(text || "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
    }

    function buildUntappdLink(brewery) {
      const parts = [brewery.name, brewery.city, brewery.state].filter(Boolean);
      return `${UNTAPPD_SEARCH_BASE}${encodeURIComponent(parts.join(" "))}`;
    }

    function haversineMiles(lat1, lon1, lat2, lon2) {
      const toRad = (deg) => (deg * Math.PI) / 180;
      const R = 3958.8;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);

      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) *
          Math.cos(toRad(lat2)) *
          Math.sin(dLon / 2) ** 2;

      return 2 * R * Math.asin(Math.sqrt(a));
    }

    function typeIcon(type) {
      const normalized = (type || "").toLowerCase();
      if (normalized.includes("brewpub")) return "🍴";
      if (normalized.includes("micro")) return "🍺";
      if (normalized.includes("regional")) return "🏭";
      if (normalized.includes("large")) return "🏢";
      if (normalized.includes("planning")) return "🛠️";
      if (normalized.includes("contract")) return "📦";
      if (normalized.includes("proprietor")) return "🏠";
      return "🍻";
    }

    function titleCase(text) {
      return String(text || "")
        .split(/[\s_-]+/)
        .filter(Boolean)
        .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
        .join(" ");
    }

    async function fetchBreweriesByDistance(lat, lng, perPage = 50, page = 1) {
      const url = new URL(OPEN_BREWERY_URL);
      url.searchParams.set("by_dist", `${lat},${lng}`);
      url.searchParams.set("per_page", String(perPage));
      url.searchParams.set("page", String(page));

      const response = await fetch(url.toString());
      if (!response.ok) throw new Error(`Open Brewery DB error: ${response.status}`);
      return response.json();
    }

    function isClosed(brewery) {
      // Open Brewery DB v1 includes `is_closed` for some records.
      // If it's missing/undefined, treat as "unknown" (not closed).
      return brewery && brewery.is_closed === true;
    }

    function applyClosedFilter(items) {
      const includeClosed = includeClosedToggle.checked;
      if (includeClosed) return items;
      return items.filter((b) => !isClosed(b));
    }

    function sortByDistance(items) {
      return [...items].sort((a, b) => a.distanceMiles - b.distanceMiles);
    }

    async function loadBreweries() {
      if (state.userLat == null || state.userLng == null) return;

      setLoading(true);
      setStatus("Loading breweries near you...");

      try {
        const [page1, page2] = await Promise.all([
          fetchBreweriesByDistance(state.userLat, state.userLng, 50, 1),
          fetchBreweriesByDistance(state.userLat, state.userLng, 50, 2)
        ]);

        const raw = [...page1, ...page2];

        const unique = [];
        const seen = new Set();

        for (const brewery of raw) {
          const lat = Number(brewery.latitude);
          const lng = Number(brewery.longitude);
          if (!Number.isFinite(lat) || !Number.isFinite(lng)) continue;

          const key = `${slugify(brewery.name)}|${slugify(brewery.city)}|${slugify(brewery.state)}`;
          if (seen.has(key)) continue;
          seen.add(key);

          const distance = haversineMiles(state.userLat, state.userLng, lat, lng);

          unique.push({
            ...brewery,
            latitude: lat,
            longitude: lng,
            distanceMiles: distance
          });
        }

        state.breweries = unique;
        state.visibleCount = 20;
        state.hasLoadedOnce = true;

        renderAll();

        setStatus(`Showing breweries near ${state.userLat.toFixed(4)}, ${state.userLng.toFixed(4)}`);
      } catch (error) {
        console.error(error);
        showError("Couldn’t load breweries right now.");
        setStatus("Error loading breweries.");
      } finally {
        setLoading(false);
      }
    }

    function updateCounts(total) {
      resultsCount.textContent = `${total} result${total === 1 ? "" : "s"}`;
    }

    function renderList(sorted) {
      const visible = sorted.slice(0, state.visibleCount);

      if (!visible.length) {
        breweryList.style.display = "none";
        listState.style.display = "block";
        listState.className = "empty";
        listState.textContent = state.hasLoadedOnce
          ? "No breweries found nearby (after filters)."
          : "Tap “Locate Me” to load breweries near you.";
        loadMoreBtn.style.display = "none";
        return;
      }

      listState.style.display = "none";
      breweryList.style.display = "grid";

      breweryList.innerHTML = visible
        .map((brewery) => {
          const address = [brewery.street, brewery.city, brewery.state, brewery.postal_code]
            .filter(Boolean)
            .join(", ");

          const website = brewery.website_url;
          const untappdLink = buildUntappdLink(brewery);

          const phoneDigits = String(brewery.phone || "").replace(/\D/g, "");
          const formattedPhone = formatPhone(brewery.phone);
          const telHref = phoneDigits ? `tel:${phoneDigits}` : null;

          const closedBadge = isClosed(brewery)
            ? `<div class="pill">🚫 Permanently closed</div>`
            : "";

          return `
            <article class="brewery-card">
              <div class="brewery-top">
                <div>
                  <h3 class="brewery-name">${escapeHtml(brewery.name)}</h3>
                  <div class="brewery-type">
                    <span>${typeIcon(brewery.brewery_type)}</span>
                    <span>${escapeHtml(titleCase(brewery.brewery_type || "Brewery"))}</span>
                  </div>
                </div>
              </div>

              <div class="brewery-meta">
                <div class="pill">📍 ${formatMiles(brewery.distanceMiles)}</div>
                ${address ? `<div class="pill">🧭 ${escapeHtml(address)}</div>` : ""}
                ${
                  telHref
                    ? `<div class="pill">📞 <a href="${telHref}">${escapeHtml(formattedPhone)}</a></div>`
                    : (brewery.phone ? `<div class="pill">📞 ${escapeHtml(formattedPhone)}</div>` : "")
                }
                ${closedBadge}
              </div>

              <div class="brewery-actions">
                <a class="action-link" href="${untappdLink}" target="_blank" rel="noopener noreferrer">
                  View on Untappd
                </a>
                ${
                  website
                    ? `<a class="action-link" href="${escapeAttribute(website)}" target="_blank" rel="noopener noreferrer">Website</a>`
                    : ""
                }
                <a
                  class="action-link"
                  href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(`${brewery.latitude},${brewery.longitude}`)}"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  Directions
                </a>
              </div>
            </article>
          `;
        })
        .join("");

      loadMoreBtn.style.display = state.visibleCount < sorted.length ? "inline-flex" : "none";
    }

    function renderMap(sorted) {
      clearBreweryMarkers();

      if (state.userLat != null && state.userLng != null) {
        if (!state.userMarker) {
          state.userMarker = L.marker([state.userLat, state.userLng]).addTo(state.map);
        } else {
          state.userMarker.setLatLng([state.userLat, state.userLng]);
        }
        state.userMarker.bindPopup("<strong>You are here</strong>");
      }

      const visible = sorted.slice(0, Math.min(state.visibleCount, 50));
      const bounds = [];

      if (state.userLat != null && state.userLng != null) bounds.push([state.userLat, state.userLng]);

      for (const brewery of visible) {
        const marker = L.marker([brewery.latitude, brewery.longitude]).addTo(state.map);

        const closedText = isClosed(brewery) ? "<br><strong>🚫 Permanently closed</strong>" : "";
        const popupHtml = `
          <div>
            <div class="popup-title">${escapeHtml(brewery.name)}</div>
            <div class="popup-meta">
              ${escapeHtml(titleCase(brewery.brewery_type || "Brewery"))}<br>
              ${escapeHtml(formatMiles(brewery.distanceMiles))} away
              ${closedText}
            </div>
            <a class="popup-link" href="${buildUntappdLink(brewery)}" target="_blank" rel="noopener noreferrer">
              Untappd
            </a>
          </div>
        `;

        marker.bindPopup(popupHtml);
        state.breweryMarkers.push(marker);
        bounds.push([brewery.latitude, brewery.longitude]);
      }

      if (bounds.length > 1) {
        state.map.fitBounds(bounds, { padding: [30, 30] });
      } else if (state.userLat != null && state.userLng != null) {
        state.map.setView([state.userLat, state.userLng], 12);
      }
    }

    function renderAll() {
      const filtered = applyClosedFilter(state.breweries);
      const sorted = sortByDistance(filtered);
      updateCounts(sorted.length);
      renderList(sorted);
      renderMap(sorted);
    }

    function clearBreweryMarkers() {
      for (const marker of state.breweryMarkers) state.map.removeLayer(marker);
      state.breweryMarkers = [];
    }

    function setLoading(isLoading) {
      locateBtn.disabled = isLoading;
      refreshBtn.disabled = isLoading;
      includeClosedToggle.disabled = isLoading;

      if (isLoading) {
        breweryList.style.display = "none";
        listState.style.display = "block";
        listState.className = "loading";
        listState.textContent = "Loading breweries...";
        loadMoreBtn.style.display = "none";
      }
    }

    function showError(message) {
      breweryList.style.display = "none";
      listState.style.display = "block";
      listState.className = "error";
      listState.textContent = message;
      loadMoreBtn.style.display = "none";
    }

    function requestLocationAndLoad() {
      if (!navigator.geolocation) {
        showError("Geolocation isn’t supported on this device.");
        setStatus("Geolocation not supported.");
        return;
      }

      setStatus("Getting your location...");

      navigator.geolocation.getCurrentPosition(
        (position) => {
          state.userLat = position.coords.latitude;
          state.userLng = position.coords.longitude;
          loadBreweries();
        },
        (error) => {
          console.error(error);
          showError("Couldn’t get your location. Check browser location permissions.");
          setStatus("Location access denied or unavailable.");
        },
        { enableHighAccuracy: true, timeout: 12000, maximumAge: 300000 }
      );
    }

    function formatPhone(phone) {
      const digits = String(phone || "").replace(/\D/g, "");
      if (digits.length === 10) return `(${digits.slice(0, 3)}) ${digits.slice(3, 6)}-${digits.slice(6)}`;
      return phone || "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value);
    }

    locateBtn.addEventListener("click", requestLocationAndLoad);

    refreshBtn.addEventListener("click", () => {
      if (state.userLat == null || state.userLng == null) {
        requestLocationAndLoad();
        return;
      }
      loadBreweries();
    });

    includeClosedToggle.addEventListener("change", () => {
      // re-render from existing data; no refetch needed
      renderAll();
    });

    loadMoreBtn.addEventListener("click", () => {
      state.visibleCount += 20;
      renderAll();
    });

    window.addEventListener("load", () => {
      initMap();
    });
  </script>
</body>
</html>
