<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Brewery Finder</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>

:root{
--bg:#081018;
--card:#0f172a;
--text:#f8fafc;
--muted:#94a3b8;
--line:rgba(148,163,184,.18);
--accent:#22c55e;
--shadow:0 15px 40px rgba(0,0,0,.35);
--radius:16px;
--maxw:960px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui, -apple-system, Segoe UI, Roboto;
background:linear-gradient(#071019,#0b1220);
color:var(--text);
}

.app{
max-width:var(--maxw);
margin:auto;
padding:0 16px 40px;
}

/* HEADER */

.header{
position:sticky;
top:0;
z-index:100;
backdrop-filter:blur(14px);
background:rgba(8,16,24,.9);
border-bottom:1px solid var(--line);
}

.header-inner{
display:flex;
align-items:center;
gap:14px;
padding:14px 6px;
}

.brand-logo{
width:52px;
height:52px;
object-fit:contain;
border-radius:12px;
}

.brand-title{
font-size:28px;
font-weight:700;
letter-spacing:-.02em;
}

/* HERO */

.hero{
margin-top:16px;
background:var(--card);
border-radius:var(--radius);
padding:18px;
border:1px solid var(--line);
box-shadow:var(--shadow);
}

.hero h2{
margin:0;
font-size:22px;
}

.sub{
margin-top:6px;
color:var(--muted);
font-size:14px;
}

/* SEARCH */

.search{
margin-top:16px;
position:relative;
}

.search input{
width:100%;
padding:14px 16px;
border-radius:14px;
border:1px solid var(--line);
background:#020617;
color:white;
}

.suggestions{
position:absolute;
left:0;
right:0;
top:105%;
background:#020617;
border-radius:14px;
border:1px solid var(--line);
overflow:hidden;
z-index:200;
}

.suggestion{
padding:12px 14px;
cursor:pointer;
border-bottom:1px solid var(--line);
}

.suggestion:hover{
background:#1e293b;
}

.hidden{
display:none;
}

/* BUTTONS */

.controls{
margin-top:14px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
background:var(--accent);
border:none;
padding:10px 14px;
border-radius:12px;
font-weight:600;
cursor:pointer;
}

.secondary{
background:#1e293b;
color:white;
border:1px solid var(--line);
}

/* MAP */

.map{
margin-top:18px;
border-radius:var(--radius);
overflow:hidden;
border:1px solid var(--line);
}

#map{
height:320px;
}

/* BREWERIES */

.list{
margin-top:18px;
display:grid;
gap:14px;
}

.card{
background:var(--card);
border-radius:var(--radius);
border:1px solid var(--line);
padding:16px;
box-shadow:var(--shadow);
}

.card h3{
margin:0;
font-size:20px;
}

.meta{
margin-top:10px;
color:var(--muted);
font-size:14px;
}

.actions{
margin-top:14px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.action{
padding:10px 12px;
border-radius:10px;
background:#1e293b;
border:1px solid var(--line);
font-size:14px;
}

.action:hover{
background:#334155;
}

.call{
background:#22c55e22;
border:1px solid #22c55e55;
}

.maps{
background:#3b82f622;
border:1px solid #3b82f655;
}

.untappd{
background:#f59e0b22;
border:1px solid #f59e0b55;
}

</style>
</head>

<body>

<div class="header">
<div class="app header-inner">

<img src="IMG_0952.png" class="brand-logo">

<div class="brand-title">Brewery Finder</div>

</div>
</div>

<div class="app">

<div class="hero">

<h2>Brewery Finder</h2>

<div class="sub">
Presented by the DK: Hot, single breweries in your area
</div>

<div class="search">

<input id="searchInput" placeholder="Search a city or neighborhood">

<div id="suggestions" class="suggestions hidden"></div>

</div>

<div class="controls">

<button id="locateBtn">Use My Location</button>

<button id="refreshBtn" class="secondary">Refresh</button>

</div>

</div>

<div class="map">
<div id="map"></div>
</div>

<div id="breweryList" class="list"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const BREWERY_API="https://api.openbrewerydb.org/v1/breweries"
const PHOTON="https://photon.komoot.io/api/"

let map=L.map("map").setView([39.8283,-98.5795],4)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{maxZoom:19}
).addTo(map)

let userMarker
let breweryMarkers=[]

const searchInput=document.getElementById("searchInput")
const suggestions=document.getElementById("suggestions")
const list=document.getElementById("breweryList")

async function searchPlaces(q){

let res=await fetch(`${PHOTON}?q=${q}&limit=6`)
let data=await res.json()

return data.features.map(f=>{
let p=f.properties
let c=f.geometry.coordinates

return{
label:p.name||p.city||p.street,
sub:p.city||p.state||"",
lat:c[1],
lng:c[0]
}
})

}

searchInput.addEventListener("input",async e=>{

let q=e.target.value.trim()

if(q.length<2){
suggestions.classList.add("hidden")
return
}

let places=await searchPlaces(q)

suggestions.innerHTML=places.map((p,i)=>`
<div class="suggestion" data-i="${i}">
${p.label} ${p.sub?`• ${p.sub}`:""}
</div>
`).join("")

suggestions.classList.remove("hidden")

suggestions.onclick=ev=>{
let i=ev.target.dataset.i
let place=places[i]
selectLocation(place.lat,place.lng,place.label)
}

})

async function selectLocation(lat,lng,label){

suggestions.classList.add("hidden")

if(userMarker) map.removeLayer(userMarker)

userMarker=L.marker([lat,lng]).addTo(map)

map.setView([lat,lng],12)

loadBreweries(lat,lng)

}

async function loadBreweries(lat,lng){

let res=await fetch(`${BREWERY_API}?by_dist=${lat},${lng}&per_page=50`)
let breweries=await res.json()

list.innerHTML=""

breweryMarkers.forEach(m=>map.removeLayer(m))
breweryMarkers=[]

breweries.forEach(b=>{

let lat=parseFloat(b.latitude)
let lng=parseFloat(b.longitude)

if(!lat||!lng) return

let marker=L.marker([lat,lng]).addTo(map)

breweryMarkers.push(marker)

let address=[b.street,b.city,b.state].filter(Boolean).join(", ")

let phone=b.phone?`(${b.phone.slice(0,3)}) ${b.phone.slice(3,6)}-${b.phone.slice(6)}`:""

let maps=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address||b.name)}`
let untappd=`https://untappd.com/search?q=${encodeURIComponent(b.name)}`

list.innerHTML+=`

<div class="card">

<h3>${b.name}</h3>

<div class="meta">${address}</div>

<div class="meta">${phone}</div>

<div class="actions">

<a class="action call" href="tel:${b.phone||""}">Call</a>

<a class="action maps" href="${maps}" target="_blank">Google Maps</a>

<a class="action untappd" href="${untappd}" target="_blank">Untappd</a>

</div>

</div>

`

})

}

document.getElementById("locateBtn").onclick=()=>{

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude
let lng=pos.coords.longitude

selectLocation(lat,lng,"My location")

})

}

</script>

</body>
</html>
